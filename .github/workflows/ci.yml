name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Nightly required for unstable rustfmt options (imports_granularity, group_imports)
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-features --all-targets -- -D warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # rpc/ipc rustdoc needs a consumer-selected remoc codec and a separate
      # docs-link cleanup; clippy, tests, and coverage still exercise all features.
      - run: cargo doc --no-deps --no-default-features --features dquic,hyper,serde,testing,webtransport

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features --all-targets

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate coverage summary
        run: |
          cargo llvm-cov clean
          cargo llvm-cov \
            --all-features \
            --all-targets \
            --summary-only \
            --json \
            --output-path target/coverage.json \
            --fail-under-lines 62 \
            --fail-under-functions 56 \
            --fail-under-regions 64
      - name: Generate LCOV report
        run: cargo llvm-cov report --lcov --output-path target/lcov.info
      - name: Generate HTML report
        run: cargo llvm-cov report --html --output-dir target/llvm-cov
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: h3x-coverage
          path: |
            target/coverage.json
            target/lcov.info
            target/llvm-cov/html
